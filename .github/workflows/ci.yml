name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python — install and test
        uses: astral-sh/setup-uv@v4
      - run: |
          cd python
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e .
          uv pip install pytest
          python -c "from openvip import Client, create_transcription, Status; print('OK')"
          pytest tests/ -v

      - name: TypeScript — build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd typescript
          npm install
          npm run build

      - name: Go — build
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: |
          cd go
          go build ./...

      - name: .NET — build
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: |
          cd dotnet
          dotnet build

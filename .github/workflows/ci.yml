name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: "Python — test"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install and test
        run: |
          cd python
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e .
          uv pip install pytest
          python -c "from openvip import Client, create_transcription, Status; print('OK')"
          pytest tests/ -v

  python-macos:
    name: "Python — macOS ARM64"
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install and test
        run: |
          cd python
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e .
          uv pip install pytest
          pytest tests/ -v

  typescript:
    name: "TypeScript — build"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          cd typescript
          npm install
          npm run build

  go:
    name: "Go — build"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: |
          cd go
          go build ./...

  dotnet:
    name: ".NET — build"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cd dotnet
          dotnet build
